<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc; /* Tailwind slate-50 */
            touch-action: manipulation; /* Prevent double-tap zoom on mobile */
        }
        
        .flag-container {
            aspect-ratio: 3/2;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
            background: #1e293b;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.25);
            border: 4px solid #334155;
        }

        #flag-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: clip-path 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            /* Initial state: Top-left quadrant (1/4) */
            clip-path: polygon(0% 0%, 50% 0%, 50% 50%, 0% 50%); 
        }

        .letter-blank {
            border-bottom: 3px solid #cbd5e1;
            width: 2rem;
            height: 2.5rem;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            padding-bottom: 0.25rem;
            margin: 0 0.25rem;
        }

        @media (min-width: 640px) {
            .letter-blank {
                width: 2.5rem;
                height: 3rem;
                font-size: 2rem;
                margin: 0 0.5rem;
            }
        }

        .space-blank {
            width: 1.5rem;
            border: none;
        }

        .key-btn {
            background-color: #334155;
            color: #f8fafc;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.125rem;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.75rem 0;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .key-btn.correct {
            background-color: #10b981; /* emerald-500 */
            color: white;
            opacity: 0.8;
            pointer-events: none;
        }

        .key-btn.wrong {
            background-color: #ef4444; /* red-500 */
            color: white;
            opacity: 0.4;
            pointer-events: none;
        }

        .modal-enter {
            animation: modalFadeIn 0.3s ease-out forwards;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<style>
.home-btn-wrap {
  position: fixed; top: 12px; left: 12px; z-index: 9999;
}
.home-btn {
  display: flex; align-items: center; gap: 7px;
  background: rgba(15,20,40,0.85);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 999px;
  padding: 8px 16px 8px 10px;
  color: #fff;
  font-family: 'Boogaloo', 'Fredoka One', cursive, sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.5px;
  backdrop-filter: blur(12px);
  transition: background 0.18s, border-color 0.18s, transform 0.15s;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  white-space: nowrap;
}
.home-btn:hover { background: rgba(30,40,80,0.97); border-color: rgba(255,255,255,0.4); transform: scale(1.05); }
.home-btn:active { transform: scale(0.96); }
.home-btn .hico { font-size: 1.2rem; line-height:1; }
</style>
<div class="home-btn-wrap">
  <a class="home-btn" href="https://seruseruan.xyz" title="Back to Game Library">
    <span class="hico">🪐</span> Game Zone
  </a>
</div>


    <header class="w-full p-4 flex justify-between items-center bg-slate-800 shadow-md">
        <h1 class="text-xl md:text-2xl font-bold text-blue-400 tracking-wide">Flag<span class="text-white">Guesser</span></h1>
        <div class="flex gap-4 text-sm md:text-base font-semibold">
            <div class="bg-slate-700 px-3 py-1 rounded-md text-emerald-400">Streak: <span id="streak-counter">0</span></div>
            <div class="bg-slate-700 px-3 py-1 rounded-md text-red-400">Mistakes: <span id="mistake-counter">0</span>/4</div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-start pt-6 pb-6 px-4 w-full max-w-4xl mx-auto">
        
        <!-- Flag Image Container -->
        <div class="flag-container mb-8 relative">
            <!-- Background pattern for the hidden part of the flag -->
            <div class="absolute inset-0 flex items-center justify-center text-slate-600 opacity-20 text-6xl pointer-events-none">
                ?
            </div>
            <!-- The actual flag image controlled via JS -->
            <img id="flag-image" src="" alt="Country Flag" draggable="false">
        </div>

        <!-- Word Container -->
        <div id="word-container" class="flex flex-wrap justify-center mb-10 w-full gap-y-4">
            <!-- Blanks will be injected here by JS -->
        </div>

        <!-- Keyboard Container -->
        <div id="keyboard-container" class="w-full max-w-2xl flex flex-col gap-2">
            <!-- Rows injected by JS -->
        </div>

    </main>

    <!-- Result Modal Overlay (Hidden by Default) -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center px-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-sm w-full text-center modal-enter">
            <h2 id="modal-title" class="text-3xl font-bold mb-2"></h2>
            <p id="modal-message" class="text-slate-300 mb-6 text-lg"></p>
            
            <div class="mb-6">
                <img id="modal-flag" src="" alt="Full Flag" class="w-32 h-auto mx-auto rounded border border-slate-600 shadow-md">
            </div>

            <button id="next-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition-colors text-lg shadow-lg">
                Next Round
            </button>
        </div>
    </div>

    <script>
        // Extensive list of countries with flag CDN codes (Over 150 countries)
        const countries = [
            { name: "AFGHANISTAN", code: "af" }, { name: "ALBANIA", code: "al" }, { name: "ALGERIA", code: "dz" }, { name: "ANDORRA", code: "ad" }, { name: "ANGOLA", code: "ao" },
            { name: "ARGENTINA", code: "ar" }, { name: "ARMENIA", code: "am" }, { name: "AUSTRALIA", code: "au" }, { name: "AUSTRIA", code: "at" }, { name: "AZERBAIJAN", code: "az" },
            { name: "BAHAMAS", code: "bs" }, { name: "BAHRAIN", code: "bh" }, { name: "BANGLADESH", code: "bd" }, { name: "BARBADOS", code: "bb" }, { name: "BELARUS", code: "by" },
            { name: "BELGIUM", code: "be" }, { name: "BELIZE", code: "bz" }, { name: "BENIN", code: "bj" }, { name: "BHUTAN", code: "bt" }, { name: "BOLIVIA", code: "bo" },
            { name: "BOSNIA", code: "ba" }, { name: "BOTSWANA", code: "bw" }, { name: "BRAZIL", code: "br" }, { name: "BRUNEI", code: "bn" }, { name: "BULGARIA", code: "bg" },
            { name: "BURKINA FASO", code: "bf" }, { name: "BURUNDI", code: "bi" }, { name: "CAMBODIA", code: "kh" }, { name: "CAMEROON", code: "cm" }, { name: "CANADA", code: "ca" },
            { name: "CAPE VERDE", code: "cv" }, { name: "CHAD", code: "td" }, { name: "CHILE", code: "cl" }, { name: "CHINA", code: "cn" }, { name: "COLOMBIA", code: "co" },
            { name: "COMOROS", code: "km" }, { name: "COSTA RICA", code: "cr" }, { name: "CROATIA", code: "hr" }, { name: "CUBA", code: "cu" }, { name: "CYPRUS", code: "cy" },
            { name: "CZECHIA", code: "cz" }, { name: "DENMARK", code: "dk" }, { name: "DJIBOUTI", code: "dj" }, { name: "DOMINICA", code: "dm" }, { name: "ECUADOR", code: "ec" },
            { name: "EGYPT", code: "eg" }, { name: "EL SALVADOR", code: "sv" }, { name: "ERITREA", code: "er" }, { name: "ESTONIA", code: "ee" }, { name: "ESWATINI", code: "sz" },
            { name: "ETHIOPIA", code: "et" }, { name: "FIJI", code: "fj" }, { name: "FINLAND", code: "fi" }, { name: "FRANCE", code: "fr" }, { name: "GABON", code: "ga" },
            { name: "GAMBIA", code: "gm" }, { name: "GEORGIA", code: "ge" }, { name: "GERMANY", code: "de" }, { name: "GHANA", code: "gh" }, { name: "GREECE", code: "gr" },
            { name: "GUATEMALA", code: "gt" }, { name: "GUINEA", code: "gn" }, { name: "GUYANA", code: "gy" }, { name: "HAITI", code: "ht" }, { name: "HONDURAS", code: "hn" },
            { name: "HUNGARY", code: "hu" }, { name: "ICELAND", code: "is" }, { name: "INDIA", code: "in" }, { name: "INDONESIA", code: "id" }, { name: "IRAN", code: "ir" },
            { name: "IRAQ", code: "iq" }, { name: "IRELAND", code: "ie" }, { name: "ISRAEL", code: "il" }, { name: "ITALY", code: "it" }, { name: "JAMAICA", code: "jm" },
            { name: "JAPAN", code: "jp" }, { name: "JORDAN", code: "jo" }, { name: "KAZAKHSTAN", code: "kz" }, { name: "KENYA", code: "ke" }, { name: "KUWAIT", code: "kw" },
            { name: "LAOS", code: "la" }, { name: "LATVIA", code: "lv" }, { name: "LEBANON", code: "lb" }, { name: "LIBYA", code: "ly" }, { name: "LITHUANIA", code: "lt" },
            { name: "LUXEMBOURG", code: "lu" }, { name: "MADAGASCAR", code: "mg" }, { name: "MALAWI", code: "mw" }, { name: "MALAYSIA", code: "my" }, { name: "MALDIVES", code: "mv" },
            { name: "MALI", code: "ml" }, { name: "MALTA", code: "mt" }, { name: "MEXICO", code: "mx" }, { name: "MOLDOVA", code: "md" }, { name: "MONACO", code: "mc" },
            { name: "MONGOLIA", code: "mn" }, { name: "MONTENEGRO", code: "me" }, { name: "MOROCCO", code: "ma" }, { name: "MOZAMBIQUE", code: "mz" }, { name: "MYANMAR", code: "mm" },
            { name: "NAMIBIA", code: "na" }, { name: "NEPAL", code: "np" }, { name: "NETHERLANDS", code: "nl" }, { name: "NEW ZEALAND", code: "nz" }, { name: "NICARAGUA", code: "ni" },
            { name: "NIGER", code: "ne" }, { name: "NIGERIA", code: "ng" }, { name: "NORTH KOREA", code: "kp" }, { name: "NORWAY", code: "no" }, { name: "OMAN", code: "om" },
            { name: "PAKISTAN", code: "pk" }, { name: "PANAMA", code: "pa" }, { name: "PARAGUAY", code: "py" }, { name: "PERU", code: "pe" }, { name: "PHILIPPINES", code: "ph" },
            { name: "POLAND", code: "pl" }, { name: "PORTUGAL", code: "pt" }, { name: "QATAR", code: "qa" }, { name: "ROMANIA", code: "ro" }, { name: "RUSSIA", code: "ru" },
            { name: "RWANDA", code: "rw" }, { name: "SAUDI ARABIA", code: "sa" }, { name: "SENEGAL", code: "sn" }, { name: "SERBIA", code: "rs" }, { name: "SINGAPORE", code: "sg" },
            { name: "SLOVAKIA", code: "sk" }, { name: "SLOVENIA", code: "si" }, { name: "SOMALIA", code: "so" }, { name: "SOUTH AFRICA", code: "za" }, { name: "SOUTH KOREA", code: "kr" },
            { name: "SPAIN", code: "es" }, { name: "SRI LANKA", code: "lk" }, { name: "SUDAN", code: "sd" }, { name: "SWEDEN", code: "se" }, { name: "SWITZERLAND", code: "ch" },
            { name: "SYRIA", code: "sy" }, { name: "TAIWAN", code: "tw" }, { name: "TAJIKISTAN", code: "tj" }, { name: "TANZANIA", code: "tz" }, { name: "THAILAND", code: "th" },
            { name: "TOGO", code: "tg" }, { name: "TUNISIA", code: "tn" }, { name: "TURKEY", code: "tr" }, { name: "TURKMENISTAN", code: "tm" }, { name: "UGANDA", code: "ug" },
            { name: "UKRAINE", code: "ua" }, { name: "UNITED KINGDOM", code: "gb" }, { name: "UNITED STATES", code: "us" }, { name: "URUGUAY", code: "uy" }, { name: "UZBEKISTAN", code: "uz" },
            { name: "VENEZUELA", code: "ve" }, { name: "VIETNAM", code: "vn" }, { name: "YEMEN", code: "ye" }, { name: "ZAMBIA", code: "zm" }, { name: "ZIMBABWE", code: "zw" }
        ];

        // QWERTY keyboard layout
        const keyboardLayout = [
            ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
            ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
            ["Z", "X", "C", "V", "B", "N", "M"]
        ];

        // Game State
        let currentCountry = null;
        let guessedLetters = new Set();
        let mistakes = 0;
        let streak = 0;
        let isGameOver = false;
        const MAX_MISTAKES = 4;

        // DOM Elements
        const flagImage = document.getElementById('flag-image');
        const wordContainer = document.getElementById('word-container');
        const keyboardContainer = document.getElementById('keyboard-container');
        const mistakeCounter = document.getElementById('mistake-counter');
        const streakCounter = document.getElementById('streak-counter');
        
        const resultModal = document.getElementById('result-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalFlag = document.getElementById('modal-flag');
        const nextBtn = document.getElementById('next-btn');

        
        // Setup Keyboard UI
        function createKeyboard() {
            keyboardContainer.innerHTML = '';
            keyboardLayout.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center gap-1 sm:gap-2 w-full';
                row.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.className = 'key-btn flex-1 max-w-[3rem] h-12 sm:h-14';
                    btn.textContent = letter;
                    btn.dataset.letter = letter;
                    btn.addEventListener('click', () => handleGuess(letter));
                    rowDiv.appendChild(btn);
                });
                keyboardContainer.appendChild(rowDiv);
            });
        }

        // Initialize a new round
        function initRound() {
            // Reset state
            guessedLetters.clear();
            mistakes = 0;
            isGameOver = false;
            
            // Hide modal
            resultModal.classList.add('hidden');
            resultModal.classList.remove('flex');

            // Pick random country
            const randomIndex = Math.floor(Math.random() * countries.length);
            currentCountry = countries[randomIndex];

            // Setup UI
            mistakeCounter.textContent = mistakes;
            streakCounter.textContent = streak;
            
            // Set flag source (using reliable flagcdn)
            flagImage.src = `https://flagcdn.com/w640/${currentCountry.code}.png`;
            updateFlagReveal();
            
            // Re-render word blanks and keyboard
            renderWord();
            createKeyboard();
        }

        // Update the clip-path of the flag based on mistakes
        function updateFlagReveal() {
            // 0 mistakes = Top-left quadrant (1/4)
            // 1 mistake  = Top half (1/2)
            // 2 mistakes = Top half + Bottom-left quadrant (3/4)
            // 3+ mistakes = Full flag (4/4)
            
            let polygonPath;
            if (mistakes === 0) {
                // Top-left square
                polygonPath = 'polygon(0% 0%, 50% 0%, 50% 50%, 0% 50%)';
            } else if (mistakes === 1) {
                // Top half rectangle
                polygonPath = 'polygon(0% 0%, 100% 0%, 100% 50%, 0% 50%)';
            } else if (mistakes === 2) {
                // "L" shape covering top half and bottom left
                polygonPath = 'polygon(0% 0%, 100% 0%, 100% 50%, 50% 50%, 50% 100%, 0% 100%)';
            } else {
                // Full square
                polygonPath = 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)';
            }

            flagImage.style.clipPath = polygonPath;
        }

        
        // Render the blank spaces or revealed letters for the country
        function renderWord() {
            wordContainer.innerHTML = '';
            const words = currentCountry.name.split(' ');
            
            words.forEach((word, wordIndex) => {
                const wordDiv = document.createElement('div');
                wordDiv.className = 'flex justify-center';
                
                for (let i = 0; i < word.length; i++) {
                    const letter = word[i];
                    const letterDiv = document.createElement('div');
                    
                    letterDiv.className = 'letter-blank';
                    // Reveal letter if guessed or if game is over (so user sees answer)
                    if (guessedLetters.has(letter) || isGameOver) {
                        letterDiv.textContent = letter;
                        // Colorize green if won, red if revealed due to loss
                        if (isGameOver && !guessedLetters.has(letter)) {
                            letterDiv.classList.add('text-red-400');
                        } else {
                            letterDiv.classList.add('text-white');
                        }
                    }
                    
                    wordDiv.appendChild(letterDiv);
                }
                
                wordContainer.appendChild(wordDiv);

                // Add space between words if not the last word
                if (wordIndex < words.length - 1) {
                    const spaceDiv = document.createElement('div');
                    spaceDiv.className = 'space-blank';
                    wordContainer.appendChild(spaceDiv);
                }
            });
        }

        // Handle a letter guess
        function handleGuess(letter) {
            if (isGameOver || guessedLetters.has(letter)) return;

            guessedLetters.add(letter);
            
            const btn = document.querySelector(`.key-btn[data-letter="${letter}"]`);

            if (currentCountry.name.includes(letter)) {
                // Correct guess
                if(btn) btn.classList.add('correct');
                renderWord();
                checkWinCondition();
            } else {
                // Wrong guess
                if(btn) btn.classList.add('wrong');
                mistakes++;
                mistakeCounter.textContent = mistakes;
                updateFlagReveal();
                checkLoseCondition();
            }
        }

        
        function checkWinCondition() {
            // Check if every letter in the country name (excluding spaces) is guessed
            const hasWon = [...currentCountry.name].every(char => char === ' ' || guessedLetters.has(char));
            
            if (hasWon) {
                isGameOver = true;
                streak++;
                showModal(true);
            }
        }

        function checkLoseCondition() {
            if (mistakes >= MAX_MISTAKES) {
                isGameOver = true;
                streak = 0; // Reset streak on loss
                streakCounter.textContent = streak;
                renderWord(); // Reveal remaining letters
                showModal(false);
            }
        }

        function showModal(isWin) {
            // Small delay to allow the last letter/animation to render
            setTimeout(() => {
                if (isWin) {
                    modalTitle.textContent = "You Got It! 🎉";
                    modalTitle.className = "text-3xl font-bold mb-2 text-emerald-400";
                    modalMessage.textContent = `Excellent job! The country was ${currentCountry.name}.`;
                    nextBtn.textContent = "Next Round";
                } else {
                    modalTitle.textContent = "Game Over! 💔";
                    modalTitle.className = "text-3xl font-bold mb-2 text-red-400";
                    modalMessage.textContent = `The correct country was ${currentCountry.name}.`;
                    nextBtn.textContent = "Play Again";
                }
                
                modalFlag.src = `https://flagcdn.com/w320/${currentCountry.code}.png`;
                
                resultModal.classList.remove('hidden');
                resultModal.classList.add('flex');
            }, 600);
        }

        // Event Listeners
        nextBtn.addEventListener('click', initRound);

        // Add Physical Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (isGameOver) {
                if (e.key === 'Enter') initRound();
                return;
            }
            
            const key = e.key.toUpperCase();
            // Check if key is a letter A-Z
            if (/^[A-Z]$/.test(key)) {
                handleGuess(key);
            }
        });

        // Start the first round when the page loads
        window.onload = initRound;

    </script>
</body>
</html>

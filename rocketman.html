<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Bot - Belajar Coding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #0a0f1e;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.10) 0%, transparent 55%);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* Stars */
        .star-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .star-bg span {
            position:absolute; border-radius:50%; background:white;
            animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
            opacity:var(--op,0.5);
        }
        @keyframes twinkle {
            0%,100%{opacity:var(--op,0.5);transform:scale(1);}
            50%{opacity:0.08;transform:scale(0.4);}
        }

        /* Header */
        header {
            position:relative; z-index:10;
            background:rgba(14,20,40,0.9);
            backdrop-filter:blur(16px);
            border-bottom:2px solid rgba(255,255,255,0.07);
            padding:10px 16px;
        }
        .header-title {
            font-family:'Nunito',sans-serif; font-weight:900; font-size:1.85rem;
            background:linear-gradient(135deg,#60a5fa 0%,#c084fc 50%,#34d399 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .level-nav-btn {
            width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
            background:rgba(255,255,255,0.1); color:white; font-size:0.9rem;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.15s;
        }
        .level-nav-btn:hover{background:rgba(255,255,255,0.2);transform:scale(1.1);}
        .level-nav-btn:active{transform:scale(0.92);}
        #level-select {
            background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15);
            color:white; font-family:'Fredoka',sans-serif; font-weight:700;
            padding:4px 14px; border-radius:999px; cursor:pointer; outline:none;
            font-size:0.95rem; appearance:none; -webkit-appearance:none;
        }
        #level-select option{background:#1e293b; color:white;}

        /* Progress dots */
        .progress-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
        .dot{
            width:9px;height:9px;border-radius:50%;
            background:rgba(255,255,255,0.12);
            transition:all 0.3s;cursor:pointer;
        }
        .dot.done{background:#22c55e;box-shadow:0 0 7px rgba(34,197,94,0.6);}
        .dot.current{background:#60a5fa;box-shadow:0 0 7px rgba(96,165,250,0.7);transform:scale(1.35);}

        /* Panels */
        .game-panel {
            background:rgba(20,28,52,0.75);
            backdrop-filter:blur(12px);
            border:2px solid rgba(255,255,255,0.08);
            border-radius:22px;
        }
        .panel-title{
            font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem;
            color:rgba(255,255,255,0.85); letter-spacing:0.3px;
        }

        /* Game Board */
        #game-board {
            display:grid; gap:2px;
            background:rgba(8,12,30,0.9);
            border:3px solid rgba(255,255,255,0.12);
            border-radius:14px;
            overflow:hidden;
            box-shadow:0 0 50px rgba(59,130,246,0.15),inset 0 0 20px rgba(0,0,0,0.5);
        }
        .cell {
            background:rgba(20,30,60,0.5);
            display:flex;align-items:center;justify-content:center;
            font-size:1.5rem;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        .cell.wall {
            background:#111827;
            background-image:
                linear-gradient(135deg,rgba(255, 2, 27, 0.1) 50%,transparent 50%),
                linear-gradient(225deg,rgba(255, 2, 27, 0.1) 50%,transparent 50%),
                linear-gradient(45deg,rgba(255, 2, 27, 0.1) 50%,transparent 50%),
                linear-gradient(315deg,rgba(255, 2, 27, 0.1) 50%,transparent 50%);
            background-size:10px 10px;
        }
        .cell.start {
            background:radial-gradient(circle,rgba(59,130,246,0.25),rgba(59,130,246,0.05));
            box-shadow:inset 0 0 12px rgba(59,130,246,0.3);
        }
        .cell.finish {
            background:radial-gradient(circle,rgba(34,197,94,0.25),rgba(34,197,94,0.05));
            box-shadow:inset 0 0 12px rgba(34,197,94,0.3);
            animation:pulseFinish 2.2s ease-in-out infinite;
        }
        @keyframes pulseFinish{
            0%,100%{box-shadow:inset 0 0 12px rgba(34,197,94,0.3);}
            50%{box-shadow:inset 0 0 22px rgba(34,197,94,0.55),0 0 8px rgba(34,197,94,0.15);}
        }

        /* Blackhole FX */
        .cell.darkened {
            background-color: #020617 !important;
            background-image: none !important;
            box-shadow: inset 0 0 15px #000 !important;
            border-color: #0f172a !important;
        }
        .cell.darkened > * {
            opacity: 0.15 !important; /* Bumi/Finish masih terlihat samar */
            filter: brightness(0.3) !important;
            transition: opacity 0.4s, filter 0.4s;
        }
        .cell.darkened > .static-star {
            opacity: 0 !important; /* Bintang benar-benar tidak terlihat */
        }
        .cell.blackhole-center {
            background: radial-gradient(circle, #3b0764, #000) !important;
            box-shadow: inset 0 0 25px #000, 0 0 15px #a855f7 !important;
            animation: pulseBh 1s infinite alternate;
        }
        @keyframes pulseBh {
            from { filter: brightness(0.8); }
            to { filter: brightness(1.2); }
        }
        
        .in-darkness {
            opacity: 0.15 !important; /* Roket dan UFO masih terlihat samar */
            filter: brightness(0.3) drop-shadow(0 0 0px transparent) !important;
            transition: opacity 0.4s, filter 0.4s;
        }
        #moving-star.in-darkness {
            opacity: 0 !important; /* Bintang bergerak jadi tidak terlihat */
        }

        /* Efek Berkilau (Shine) 1 Grid Sekitar Bintang */
        .cell.star-shine {
            background-color: rgba(255, 255, 0, 0.5) !important;
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.8) !important;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            z-index: 20;
        }

        /* Characters */
        #player,#moving-star,#moving-ufo,#laser, .ufo-item{
            position:absolute;display:flex;align-items:center;justify-content:center;
        }
        #player{
            font-size:1.9rem;z-index:10;
            transition:all 0.32s cubic-bezier(0.25,1,0.5,1);
            filter:drop-shadow(0 0 10px rgba(96,165,250,0.7));
        }
        #moving-star{
            font-size:1.7rem;z-index:5;
            transition:all 0.32s cubic-bezier(0.25,1,0.5,1);
            filter:drop-shadow(0 0 8px rgba(251,191,36,0.8));
        }
        #moving-ufo, .ufo-item{
            font-size:1.7rem;z-index:6;
            transition:all 0.2s linear;
            filter:drop-shadow(0 0 8px rgba(168,85,247,0.8));
        }
        #laser{font-size:1.7rem;z-index:15;transition:all 0.1s linear;}

        /* Command Buttons */
        .btn-cmd {
            border:none;border-radius:16px;cursor:pointer;
            padding:11px 6px;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            font-family:'Fredoka',sans-serif;font-weight:700;
            transition:all 0.13s;
            box-shadow:0 5px 0 rgba(0,0,0,0.35);
            position:relative; overflow:hidden;
        }
        .btn-cmd:hover{transform:translateY(-3px);box-shadow:0 8px 0 rgba(0,0,0,0.35);}
        .btn-cmd:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,0.35);}
        .btn-cmd:disabled{opacity:0.35;transform:none;cursor:not-allowed;pointer-events:none;}
        .cmd-icon{font-size:2rem;margin-bottom:2px;line-height:1;}
        .cmd-label{font-size:0.68rem;color:white;font-weight:700;text-align:center;line-height:1.2;}
        .btn-left{background:linear-gradient(145deg,#7c3aed,#a855f7);}
        .btn-fwd{background:linear-gradient(145deg,#1d4ed8,#3b82f6);}
        .btn-right{background:linear-gradient(145deg,#7c3aed,#a855f7);}
        .btn-shoot{background:linear-gradient(145deg,#b91c1c,#ef4444);}

        /* Command Queue */
        #command-list{
            background:rgba(5,10,25,0.5);
            border:2px dashed rgba(255,255,255,0.12);
            border-radius:14px;padding:8px;
            overflow-y:auto;
        }
        .cmd-item{animation:popIn 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards;}
        @keyframes popIn{
            0%{transform:scale(0.4) translateY(-8px);opacity:0;}
            100%{transform:scale(1) translateY(0);opacity:1;}
        }
        .cmd-chip{
            background:rgba(255,255,255,0.06);
            border:2px solid rgba(255,255,255,0.1);
            border-radius:12px; padding:8px 10px;
            display:flex;align-items:center;gap:8px;
            color:white;font-weight:600;font-size:0.88rem;
            transition:all 0.13s; cursor:pointer;
        }
        .cmd-chip:hover{background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.35);}
        .executing{
            box-shadow:0 0 0 3px #fbbf24!important;
            transform:scale(1.03);
            background:rgba(251,191,36,0.18)!important;
        }
        .cmd-num{
            width:22px;height:22px;border-radius:50%;
            background:rgba(255,255,255,0.15);
            display:flex;align-items:center;justify-content:center;
            font-size:0.7rem;font-weight:800;flex-shrink:0;
        }
        #empty-msg{
            color:rgba(255,255,255,0.28);text-align:center;
            font-size:0.85rem;padding:18px 0;
            display:flex;flex-direction:column;align-items:center;gap:6px;
        }

        /* Action Buttons */
        .btn-clear{
            background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);
            color:rgba(255,255,255,0.65);font-family:'Fredoka',sans-serif;font-weight:700;
            border-radius:14px;padding:13px;cursor:pointer;transition:all 0.13s;font-size:0.95rem;
        }
        .btn-clear:hover{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.35);color:white;}
        .btn-undo{
            background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);
            color:rgba(255,255,255,0.55);font-family:'Fredoka',sans-serif;font-weight:700;
            border-radius:14px;padding:11px 14px;cursor:pointer;transition:all 0.13s;font-size:0.85rem;
        }
        .btn-undo:hover{background:rgba(255,255,255,0.1);color:white;}
        .btn-run{
            background:linear-gradient(145deg,#15803d,#22c55e);
            border:none;color:white;
            font-family:'Nunito',sans-serif;font-weight:900;
            border-radius:16px;padding:14px 24px;cursor:pointer;font-size:1.1rem;
            box-shadow:0 5px 0 #14532d,0 0 25px rgba(34,197,94,0.25);
            transition:all 0.13s;
            display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .btn-run:hover{transform:translateY(-2px);box-shadow:0 7px 0 #14532d,0 0 35px rgba(34,197,94,0.35);}
        .btn-run:active{transform:translateY(3px);box-shadow:0 2px 0 #14532d;}
        .btn-run:disabled{opacity:0.5;transform:none;cursor:not-allowed;box-shadow:0 3px 0 #14532d;}

        /* Step badge */
        .step-badge{
            background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);
            color:rgba(255,255,255,0.7);border-radius:999px;padding:2px 12px;
            font-size:0.78rem;font-weight:700;
        }

        /* Modal */
        .modal-overlay{background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);}
        .modal-card{
            background:linear-gradient(160deg,#1a2440,#12192e);
            border:2px solid rgba(255,255,255,0.1);
            border-radius:28px;padding:32px 26px;max-width:340px;width:90%;
            text-align:center;
            box-shadow:0 30px 70px rgba(0,0,0,0.6);
        }
        .modal-icon-wrap{
            width:88px;height:88px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:3rem;margin:0 auto 14px;
        }
        .modal-title{
            font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;
            color:white;margin-bottom:8px;
        }
        .modal-desc{color:rgba(255,255,255,0.55);font-size:0.93rem;line-height:1.55;margin-bottom:22px;}
        .modal-btn{
            width:100%;padding:14px;border:none;border-radius:16px;
            font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;
            cursor:pointer;color:white;transition:all 0.13s;
            box-shadow:0 4px 0 rgba(0,0,0,0.35);
        }
        .modal-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 rgba(0,0,0,0.35);}
        .modal-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,0.35);}

        /* Confetti */
        .confetti-piece{
            position:fixed;top:-16px;border-radius:2px;
            animation:confettiFall linear forwards;z-index:999;
        }
        @keyframes confettiFall{
            0%{transform:translateY(0) rotate(0deg);opacity:1;}
            85%{opacity:1;}
            100%{transform:translateY(105vh) rotate(760deg);opacity:0;}
        }

        /* Star collect pulse */
        @keyframes collectPulse{
            0%,100%{transform:scale(1);}
            50%{transform:scale(1.5);}
        }

        /* Hint blink */
        @keyframes hintBlink{
            0%,100%{opacity:0.5;}50%{opacity:1;}
        }
        .hint-blink{animation:hintBlink 1.4s ease-in-out infinite;}

        /* Custom scrollbar */
        ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px;}
    </style>
</head>
<body class="min-h-screen flex flex-col">
<style>

  position: fixed; top: 12px; left: 12px; z-index: 9999;
}

  padding: 8px 16px 8px 10px;
  color: #fff;

  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.5px;

.home-btn .hico { font-size: 1.2rem; line-height:1; }
</style>
<div class="home-btn-wrap">
  <a class="home-btn" href="seruseruan.xyz" title="Back to Game Library">
    <span class="hico">🪐</span> Game Zone
  </a>
</div>


    <div class="star-bg" id="star-bg"></div>

    <!-- Header -->
    <header class="shrink-0">
        <div class="max-w-6xl mx-auto flex flex-col items-center gap-2">
            <div class="header-title">🤖 Logic Bot</div>
            <div class="flex items-center gap-3">
                <button onclick="changeLevel(-1)" class="level-nav-btn">◀</button>
                <select id="level-select" onchange="jumpToLevel(parseInt(this.value))"></select>
                <button onclick="changeLevel(1)" class="level-nav-btn">▶</button>
            </div>
            <div class="progress-dots" id="progress-dots"></div>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 max-w-6xl w-full mx-auto p-3 md:p-4 flex flex-col md:flex-row gap-4" style="position:relative;z-index:1;">

        <!-- Left: Board -->
        <section class="game-panel md:flex-[1.2] flex flex-col items-center p-4 shrink-0">
            <div class="flex items-center justify-between w-full mb-3">
                <span class="panel-title">🌌 Labirin</span>
                <span id="step-badge" class="step-badge">0 langkah</span>
            </div>
            <div class="flex-1 flex items-center justify-center w-full min-h-0">
                <div id="game-board-container" class="relative">
                    <div id="game-board"></div>
                    <div id="player"><span id="player-emoji" style="display:inline-block;font-size:1.9rem;">🚀</span></div>
                    <div id="moving-star" style="display:none;"><span style="font-size:1.7rem;display:inline-block;animation:collectPulse 1.6s ease-in-out infinite;">⭐</span></div>
                    <div id="laser" style="display:none;">⚡</div>
                </div>
            </div>
            <p class="mt-3 text-center text-xs" style="color:rgba(255,255,255,0.35);">
                Bawa 🚀 dari kotak <span style="color:#60a5fa;font-weight:700;">Biru</span> ke bumi <span style="color:#4ade80;font-weight:700;">🌍 Hijau</span>!
            </p>
        </section>

        <!-- Right: Controls -->
        <section class="flex-1 w-full flex flex-col gap-3">

            <!-- Command Buttons -->
            <div class="game-panel p-4">
                <div class="flex items-center justify-between mb-3">
                    <span class="panel-title">🎮 Blok Perintah</span>
                    <span id="hint-text" class="hint-blink text-xs" style="color:rgba(96,165,250,0.7);display:none;">👆 Ketuk untuk tambah!</span>
                </div>
                <div id="command-buttons-container" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
                    <button onclick="addCommand('left')" class="btn-cmd btn-left">
                        <span class="cmd-icon">↩️</span>
                        <span class="cmd-label">Putar<br>Kiri</span>
                    </button>
                    <button onclick="addCommand('forward')" class="btn-cmd btn-fwd">
                        <span class="cmd-icon">⬆️</span>
                        <span class="cmd-label">Maju</span>
                    </button>
                    <button onclick="addCommand('right')" class="btn-cmd btn-right">
                        <span class="cmd-icon">↪️</span>
                        <span class="cmd-label">Putar<br>Kanan</span>
                    </button>
                    <button id="btn-shoot" onclick="addCommand('shoot')" class="btn-cmd btn-shoot" style="display:none;">
                        <span class="cmd-icon">💥</span>
                        <span class="cmd-label">Tembak<br><span id="ammo-count">(2/2)</span></span>
                    </button>
                </div>
            </div>

            <!-- Command Queue -->
            <div class="game-panel p-4 flex flex-col" style="flex:1;min-height:0;">
                <div class="flex justify-between items-center mb-2 shrink-0">
                    <span class="panel-title">📝 Kode Kamu</span>
                    <button onclick="undoCommand()" class="btn-undo">⟲ Undo</button>
                </div>
                <div id="command-list" class="flex flex-col gap-2" style="flex:1;max-height:200px;min-height:80px;overflow-y:auto;">
                    <div id="empty-msg">
                        <span style="font-size:2rem;">👆</span>
                        <span>Tambahkan perintah di atas!</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="game-panel p-3 flex gap-3 shrink-0">
                <button onclick="clearCommands()" class="btn-clear" style="flex:1;">🗑 Hapus</button>
                <button id="btn-run" onclick="runCode()" class="btn-run" style="flex:2;">▶ JALANKAN!</button>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden" style="opacity:0;transition:opacity 0.25s;">
        <div id="modal-content" class="modal-card" style="transform:scale(0.85);transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);">
            <div id="modal-icon-wrap" class="modal-icon-wrap">
                <span id="modal-icon"></span>
            </div>
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-desc" class="modal-desc"></div>
            <button id="modal-btn" class="modal-btn"></button>
        </div>
    </div>

    <!-- Confetti -->
    <div id="confetti-container" style="position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;"></div>

    <script>
        // Generate background stars
        (function(){
            const bg = document.getElementById('star-bg');
            for(let i=0;i<90;i++){
                const s=document.createElement('span');
                s.style.left=Math.random()*100+'%';
                s.style.top=Math.random()*100+'%';
                const sz=Math.random()>0.75?3:Math.random()>0.5?2:1.5;
                s.style.width=sz+'px'; s.style.height=sz+'px';
                s.style.setProperty('--d',(2+Math.random()*5)+'s');
                s.style.setProperty('--delay',(-Math.random()*5)+'s');
                s.style.setProperty('--op',(0.25+Math.random()*0.65).toFixed(2));
                bg.appendChild(s);
            }
        })();

        // Confetti
        function launchConfetti(){
            const colors=['#fbbf24','#f472b6','#34d399','#60a5fa','#c084fc','#fb923c','#f9fafb'];
            const c=document.getElementById('confetti-container');
            c.innerHTML='';
            for(let i=0;i<90;i++){
                const p=document.createElement('div');
                p.className='confetti-piece';
                p.style.left=Math.random()*100+'vw';
                p.style.background=colors[Math.floor(Math.random()*colors.length)];
                const w=7+Math.random()*9, h=9+Math.random()*12;
                p.style.width=w+'px'; p.style.height=h+'px';
                p.style.borderRadius=Math.random()>0.5?'50%':'2px';
                const dur=1.4+Math.random()*2.2, delay=Math.random()*1;
                p.style.animationDuration=dur+'s';
                p.style.animationDelay=delay+'s';
                c.appendChild(p);

        // --- STATE ---
        let currentLevel=0, map=[], commandQueue=[], isExecuting=false;

        // --- AUDIO ---
        const AudioCtxClass=window.AudioContext||window.webkitAudioContext;
        let audioCtx;
        function initAudio(){if(!audioCtx)audioCtx=new AudioCtxClass();if(audioCtx.state==='suspended')audioCtx.resume();}
        function playSound(type){
            if(!audioCtx)initAudio();
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            const t=audioCtx.currentTime;
            if(type==='move'){o.type='sine';o.frequency.setValueAtTime(620,t);o.frequency.exponentialRampToValueAtTime(820,t+0.1);g.gain.setValueAtTime(0.05,t);o.start();o.stop(t+0.1);}
            else if(type==='collect'){o.type='sine';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(1400,t+0.15);g.gain.setValueAtTime(0.1,t);o.start();o.stop(t+0.15);}
            else if(type==='error'){o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.25);g.gain.setValueAtTime(0.06,t);o.start();o.stop(t+0.25);}
            else if(type==='ufo'){o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(60,t+0.4);g.gain.setValueAtTime(0.07,t);o.start();o.stop(t+0.4);}
            else if(type==='win'){[400,600,800,1100].forEach((f,i)=>{const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);o2.type='triangle';o2.frequency.setValueAtTime(f,t+i*0.1);g2.gain.setValueAtTime(0.08,t+i*0.1);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.45);o2.start(t+i*0.1);o2.stop(t+i*0.1+0.45);});return;}
            else if(type==='laser'){o.type='square';o.frequency.setValueAtTime(1500,t);o.frequency.exponentialRampToValueAtTime(100,t+0.2);g.gain.setValueAtTime(0.05,t);o.start();o.stop(t+0.2);}
            else if(type==='explosion'){o.type='sawtooth';o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(10,t+0.5);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.5);o.start();o.stop(t+0.5);}
            else if(type==='click'){o.type='sine';o.frequency.setValueAtTime(900,t);g.gain.setValueAtTime(0.04,t);o.start();o.stop(t+0.05);}
            else if(type==='blackhole'){o.type='sine';o.frequency.setValueAtTime(60,t);o.frequency.exponentialRampToValueAtTime(30,t+0.3);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start();o.stop(t+0.3);}
        }

        // --- INIT ---
        function initLevelSelect(){
            const sel=document.getElementById('level-select');
            sel.innerHTML='';
            levels.forEach((_,i)=>{const o=document.createElement('option');o.value=i;o.innerText=`Level ${i+1}`;sel.appendChild(o);});
            renderProgressDots();
        }

        function renderProgressDots(){
            const c=document.getElementById('progress-dots');
            c.innerHTML='';
            levels.forEach((_,i)=>{
                const d=document.createElement('div');
                d.className='dot'+(completedLevels.has(i)?' done':'')+(i===currentLevel?' current':'');
                d.title=`Level ${i+1}`;
                d.onclick=()=>{if(!isExecuting)jumpToLevel(i);};
                c.appendChild(d);
            });
        }

        function loadLevel(){
            const ld=levels[currentLevel];
            map=ld.grid;
            document.getElementById('level-select').value=currentLevel;
            const btnShoot=document.getElementById('btn-shoot');
            const cmdContainer=document.getElementById('command-buttons-container');
            if(currentLevel>=13){btnShoot.style.display='flex';cmdContainer.style.gridTemplateColumns='repeat(4,1fr)';}
            else{btnShoot.style.display='none';cmdContainer.style.gridTemplateColumns='repeat(3,1fr)';}
            document.getElementById('hint-text').style.display=currentLevel===0?'inline':'none';
            itemRequired=false; hasCollectedItem=false;
            const board=document.getElementById('game-board');
            const rows=map.length, cols=map[0].length;
            board.style.gridTemplateColumns=`repeat(${cols},${cellSize}px)`;
            board.style.gridTemplateRows=`repeat(${rows},${cellSize}px)`;
            board.innerHTML='';
            for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
                const cell=document.createElement('div');
                cell.className='cell'; cell.id=`cell-${r}-${c}`;
                if(map[r][c]===1)cell.classList.add('wall');
                if(map[r][c]==='S'){cell.classList.add('start');initialPlayerState={r,c,dir:1};}
                if(map[r][c]==='F'){cell.classList.add('finish');cell.innerHTML='<span style="font-size:1.6rem;">🌍</span>';}
                if(map[r][c]==='C'){itemRequired=true;cell.innerHTML='<span class="static-star" style="font-size:1.4rem;display:inline-block;animation:collectPulse 1.5s ease-in-out infinite;">⭐</span>';}
                board.appendChild(cell);
            }
            const mse=document.getElementById('moving-star');
            if(ld.starPath){itemRequired=true;starState={active:true,r:ld.starPath[0][0],c:ld.starPath[0][1],pathIndex:0,path:ld.starPath};mse.style.display='flex';}
            else{starState.active=false;mse.style.display='none';}
            
            document.querySelectorAll('.ufo-item').forEach(e=>e.remove());
            const ufosData = ld.ufos || (ld.ufoPath ? [{path: ld.ufoPath, speed: ld.ufoSpeed || 1}] : []);
            ufoStates = ufosData.map((u, i) => {
                const el = document.createElement('div');
                el.className = 'ufo-item';
                el.innerHTML = '<span style="font-size:1.7rem;display:inline-block;">🛸</span>';
                document.getElementById('game-board-container').appendChild(el);
                return { active: true, r: u.path[0][0], c: u.path[0][1], pathIndex: 0, path: u.path, speed: u.speed || 1, el: el };
            });

            const cont=document.getElementById('game-board-container');
            cont.style.width=`${cols*cellSize+6}px`;
            cont.style.height=`${rows*cellSize+6}px`;
            renderProgressDots();
            
            resetPlayer();
            clearCommands();
        }

        function resetPlayer() {
            playerState = { ...initialPlayerState };
            hasCollectedItem = false;
            const ld = levels[currentLevel];

            // Kembalikan bintang static jika ada
            if (itemRequired && !ld.starPath) {
                for (let r = 0; r < map.length; r++) {
                    for (let c = 0; c < map[0].length; c++) {
                        if (map[r][c] === 'C') {
                            const cell = document.getElementById(`cell-${r}-${c}`);
                            if(cell) cell.innerHTML = '<span class="static-star" style="font-size:1.4rem;display:inline-block;animation:collectPulse 1.5s ease-in-out infinite;">⭐</span>';
                        }
                    }
                }
            }

            // Reset Bintang Bergerak
            if(ld.starPath){
                starState.active=true;
                starState.pathIndex=0;
                starState.r=ld.starPath[0][0];
                starState.c=ld.starPath[0][1];
                document.getElementById('moving-star').style.display='flex';
                updateStarVisual();
            } else {
                starState.active=false;
                document.getElementById('moving-star').style.display='none';
            }
            
            // Reset UFO dengan membaca ulang data dari level
            const ufosData = ld.ufos || (ld.ufoPath ? [{path: ld.ufoPath, speed: ld.ufoSpeed || 1}] : []);
            ufoStates.forEach((ufo, i) => {
                ufo.active = true;
                ufo.pathIndex = 0;
                ufo.r = ufosData[i].path[0][0];
                ufo.c = ufosData[i].path[0][1];
                ufo.el.style.display = 'flex';
                ufo.el.innerHTML = '<span style="font-size:1.7rem;display:inline-block;">🛸</span>';
            });
            updateUfoVisual();
            
            // Reset Blackhole
            if (ld.blackhole) {
                blackholeState = { active: true, r: ld.blackhole.r, c: ld.blackhole.c, radius: 0 };
            } else {
                blackholeState.active = false;
            }
            updateBlackholeVisual();

            document.getElementById('laser').style.display='none';
            updatePlayerVisual();
        }

        function checkDarkness(el, r, c) {
            if (!el) return;
            if (blackholeState.active && (Math.abs(r - blackholeState.r) + Math.abs(c - blackholeState.c) <= blackholeState.radius)) {
                el.classList.add('in-darkness');
            } else {
                el.classList.remove('in-darkness');
            }
        }

        function updateBlackholeVisual() {
            for (let r = 0; r < map.length; r++) {
                for (let c = 0; c < map[0].length; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    if (!cell) continue;
                    
                    cell.classList.remove('darkened', 'blackhole-center');
                    
                    if (blackholeState.active) {
                        // Menggunakan jarak Manhattan (Bentuk wajik penyebaran)
                        const dist = Math.abs(r - blackholeState.r) + Math.abs(c - blackholeState.c);
                        if (dist === 0) {
                            cell.classList.add('blackhole-center');
                            if (blackholeState.radius >= 0) cell.classList.add('darkened');
                        } else if (dist <= blackholeState.radius) {
                            cell.classList.add('darkened');
                        }
                    }
                }
            }
        }

        function updatePlayerVisual(){
            const el=document.getElementById('player');
            el.style.width=`${cellSize}px`; el.style.height=`${cellSize}px`;
            el.style.left=`${playerState.c*cellSize+3}px`;
            el.style.top=`${playerState.r*cellSize+3}px`;
            const rots={0:-45,1:45,2:135,3:-135};
            document.getElementById('player-emoji').style.transform=`rotate(${rots[playerState.dir]}deg)`;
            checkDarkness(el, playerState.r, playerState.c);
        }
        function updateStarVisual(){
            const el=document.getElementById('moving-star');
            el.style.width=`${cellSize}px`;el.style.height=`${cellSize}px`;
            el.style.left=`${starState.c*cellSize+3}px`;el.style.top=`${starState.r*cellSize+3}px`;
            checkDarkness(el, starState.r, starState.c);
        }
        function updateUfoVisual(){
            ufoStates.forEach(ufo => {
                if(!ufo.active) return;
                ufo.el.style.width=`${cellSize}px`; ufo.el.style.height=`${cellSize}px`;
                ufo.el.style.left=`${ufo.c*cellSize+3}px`; ufo.el.style.top=`${ufo.r*cellSize+3}px`;
                checkDarkness(ufo.el, ufo.r, ufo.c);
            });
        }

        // --- NAVIGATION ---
        function jumpToLevel(i){if(isExecuting){document.getElementById('level-select').value=currentLevel;return;}if(i>=0&&i<levels.length){currentLevel=i;playSound('click');loadLevel();}}
        function changeLevel(dir){if(isExecuting)return;const n=currentLevel+dir;if(n>=0&&n<levels.length)jumpToLevel(n);else playSound('error');}

        // --- COMMANDS ---
        function addCommand(cmd){
            if(isExecuting)return;
            if(cmd==='shoot'){const used=commandQueue.filter(c=>c==='shoot').length;if(used>=MAX_SHOTS){playSound('error');return;}}
            initAudio(); playSound('click');
            commandQueue.push(cmd); renderQueue();
        }
        function undoCommand(){if(isExecuting||!commandQueue.length)return;playSound('click');commandQueue.pop();renderQueue();}
        function clearCommands(){if(isExecuting)return;commandQueue=[];renderQueue();}
        function removeCommand(i){if(isExecuting)return;playSound('click');commandQueue.splice(i,1);renderQueue();}

        function renderQueue(){
            const list=document.getElementById('command-list'), em=document.getElementById('empty-msg');
            const used=commandQueue.filter(c=>c==='shoot').length, avail=MAX_SHOTS-used;
            document.getElementById('ammo-count').innerText=`(${avail}/${MAX_SHOTS})`;
            document.getElementById('btn-shoot').disabled=avail<=0;
            document.getElementById('step-badge').textContent=commandQueue.length+(commandQueue.length===1?' langkah':' langkah');
            Array.from(list.children).forEach(ch=>{if(ch.id!=='empty-msg')ch.remove();});
            if(!commandQueue.length){em.style.display='flex';}
            else{
                em.style.display='none';
                commandQueue.forEach((cmd,i)=>{
                    const div=document.createElement('div');
                    div.className='cmd-item'; div.id=`cmd-${i}`; div.onclick=()=>removeCommand(i);
                    const map={forward:{icon:'⬆️',text:'Maju',bg:'rgba(59,130,246,0.2)'},left:{icon:'↩️',text:'Putar Kiri',bg:'rgba(168,85,247,0.2)'},right:{icon:'↪️',text:'Putar Kanan',bg:'rgba(168,85,247,0.2)'},shoot:{icon:'💥',text:'Tembak',bg:'rgba(239,68,68,0.2)'}};
                    const m=map[cmd]||{icon:'?',text:cmd,bg:'transparent'};
                    div.innerHTML=`<div class="cmd-chip" style="background:${m.bg};"><span class="cmd-num">${i+1}</span><span style="font-size:1.1rem;">${m.icon}</span><span style="flex:1;">${m.text}</span><span style="color:rgba(239,68,68,0.4);font-size:0.75rem;">✕</span></div>`;
                    list.appendChild(div);
                });
                list.scrollTop=list.scrollHeight;
            }
        }

        // --- SHINE FX UTILITY ---
        function shineArea(centerR, centerC) {
            for(let r = centerR - 1; r <= centerR + 1; r++) {
                for(let c = centerC - 1; c <= centerC + 1; c++) {
                    if(r >= 0 && r < map.length && c >= 0 && c < map[0].length) {
                        const cell = document.getElementById(`cell-${r}-${c}`);
                        if(cell) {
                            cell.classList.add('star-shine');
                            setTimeout(() => {
                                if(cell) cell.classList.remove('star-shine');
                            }, 1000);
                        }
                    }
                }
            }
        }

        // --- EXECUTION ---
        const sleep=ms=>new Promise(r=>setTimeout(r,ms));

        async function runCode(){
            if(isExecuting||!commandQueue.length)return;
            initAudio(); isExecuting=true;
            const btn=document.getElementById('btn-run');
            btn.disabled=true; btn.innerHTML='⏳ Jalan...';
            resetPlayer();
            for(let i=0;i<commandQueue.length;i++){
                const el=document.getElementById(`cmd-${i}`);
                const chip=el?.querySelector('.cmd-chip');
                if(chip)chip.classList.add('executing');
                const status=await executeStep(commandQueue[i]);
                if(chip)chip.classList.remove('executing');
                if(status!=='ok'){
                    if(status==='wall')showModal('error');
                    else if(status==='ufo')showModal('ufo');
                    isExecuting=false; resetUI(); return;
                }
            }
            if(map[playerState.r][playerState.c]==='F'){
                if(itemRequired&&!hasCollectedItem)showModal('missing_item');
                else{completedLevels.add(currentLevel);renderProgressDots();showModal('win');}
            } else showModal('incomplete');
            isExecuting=false; resetUI();
        }

        function resetUI(){const btn=document.getElementById('btn-run');btn.disabled=false;btn.innerHTML='▶ JALANKAN!';}

        async function executeStep(cmd){
            let pOldR=playerState.r, pOldC=playerState.c;
            let sOldR=starState.r, sOldC=starState.c;
            let ufoOlds=ufoStates.map(u => ({r: u.r, c: u.c}));
            let hitWall=false;
            
            // 1. Aksi Laser
            if(cmd==='shoot'){
                playSound('laser');
                const le=document.getElementById('laser');
                let lr=playerState.r, lc=playerState.c;
                le.style.width=`${cellSize}px`; le.style.height=`${cellSize}px`;
                le.style.left=`${lc*cellSize+3}px`; le.style.top=`${lr*cellSize+3}px`;
                le.style.transform=`rotate(${playerState.dir*90}deg)`;
                le.innerHTML='⚡'; le.style.display='flex';
                while(true){
                    if(playerState.dir===0)lr--;if(playerState.dir===1)lc++;
                    if(playerState.dir===2)lr++;if(playerState.dir===3)lc--;
                    if(lr<0||lr>=map.length||lc<0||lc>=map[0].length||map[lr][lc]===1)break;
                    le.style.left=`${lc*cellSize+3}px`; le.style.top=`${lr*cellSize+3}px`;
                    checkDarkness(le, lr, lc);
                    await sleep(100);
                    let hitUfo = ufoStates.find(u => u.active && lr === u.r && lc === u.c);
                    if(hitUfo){
                        playSound('explosion'); hitUfo.active=false;
                        le.innerHTML='💥'; hitUfo.el.innerHTML='💥';
                        await sleep(300); hitUfo.el.style.display='none'; break;
                    }
                }
                le.style.display='none';
            } 
            // 2. Aksi Bergerak
            else {
                if(cmd==='left'){playerState.dir=(playerState.dir+3)%4;playSound('move');updatePlayerVisual();}
                else if(cmd==='right'){playerState.dir=(playerState.dir+1)%4;playSound('move');updatePlayerVisual();}
                else if(cmd==='forward'){
                    let nr=playerState.r, nc=playerState.c;
                    if(playerState.dir===0)nr--;if(playerState.dir===1)nc++;
                    if(playerState.dir===2)nr++;if(playerState.dir===3)nc--;
                    if(nr<0||nr>=map.length||nc<0||nc>=map[0].length||map[nr][nc]===1)hitWall=true;
                    else{playerState.r=nr;playerState.c=nc;playSound('move');updatePlayerVisual();}
                }
            }
            if(hitWall)return 'wall';
            
            // 3. Aksi Bintang Bergerak
            if(starState.active&&!hasCollectedItem){
                starState.pathIndex=(starState.pathIndex+1)%starState.path.length;
                starState.r=starState.path[starState.pathIndex][0];
                starState.c=starState.path[starState.pathIndex][1];
                updateStarVisual();
            }
            
            // 4. Aksi UFO
            const moveUfos=()=>{
                ufoStates.forEach((u, i) => {
                    if(!u.active) return;
                    ufoOlds[i] = {r: u.r, c: u.c};
                    u.pathIndex = (u.pathIndex+1)%u.path.length;
                    u.r = u.path[u.pathIndex][0];
                    u.c = u.path[u.pathIndex][1];
                });
                updateUfoVisual();
            };
            const checkUfos=(pr,pc)=>ufoStates.some((u, i) => u.active && ((playerState.r===u.r&&playerState.c===u.c)||(pr===u.r&&pc===u.c&&playerState.r===ufoOlds[i].r&&playerState.c===ufoOlds[i].c)));
            
            let hasActiveUfos = ufoStates.some(u => u.active);
            let maxUfoSpeed = hasActiveUfos ? Math.max(...ufoStates.filter(u=>u.active).map(u=>u.speed)) : 0;

            if(hasActiveUfos){
                if(maxUfoSpeed===2){moveUfos();await sleep(cmd==='shoot'?100:200);if(checkUfos(pOldR,pOldC))return'ufo';moveUfos();await sleep(cmd==='shoot'?100:200);if(checkUfos(playerState.r,playerState.c))return'ufo';}
                else{moveUfos();await sleep(cmd==='shoot'?200:400);if(checkUfos(pOldR,pOldC))return'ufo';}
            } else await sleep(cmd==='shoot'?100:380);
            
            // 5. Cek Pemain Mengambil Bintang (bintang dapat diambil walau dalam blackhole)
            if(map[playerState.r][playerState.c]==='C'&&!hasCollectedItem&&!starState.active){
                hasCollectedItem=true;playSound('collect');
                shineArea(playerState.r, playerState.c); // Tambahkan Shine Effect Radius 1
                const cell=document.getElementById(`cell-${playerState.r}-${playerState.c}`);
                if(cell){cell.innerHTML='<span class="static-star">✨</span>';setTimeout(()=>{if(cell)cell.innerHTML='';},500);}
            }
            if(starState.active&&!hasCollectedItem){
                const ss=(playerState.r===starState.r&&playerState.c===starState.c);
                const ps=(pOldR===starState.r&&pOldC===starState.c&&playerState.r===sOldR&&playerState.c===sOldC);
                if(ss||ps){
                    hasCollectedItem=true;playSound('collect');
                    shineArea(starState.r, starState.c); // Tambahkan Shine Effect Radius 1
                    document.getElementById('moving-star').style.display='none';
                }
            }

            // 6. Blackhole Membesar Secara Radial
            if (blackholeState.active) {
                blackholeState.radius++;
                updateBlackholeVisual();
                updatePlayerVisual(); // Update filter pemain jika ikut termakan bayangan
                playSound('blackhole');
            }

            return 'ok';
        }

        // --- MODAL ---
        function showModal(type){
            const modal=document.getElementById('modal'), content=document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(()=>{modal.style.opacity='1';content.style.transform='scale(1)';},10);
            const iw=document.getElementById('modal-icon-wrap'), ic=document.getElementById('modal-icon');
            const ti=document.getElementById('modal-title'), de=document.getElementById('modal-desc'), bt=document.getElementById('modal-btn');
            const cfgs={
                win:{bg:'rgba(34,197,94,0.15)',icon:'🎉',title:'Luar Biasa! 🚀',tc:'#4ade80',desc:'Roket kamu berhasil mendarat di Bumi! Kamu programmer hebat!',btnTxt:currentLevel<levels.length-1?'🌟 Level Berikutnya →':'🔄 Mulai Ulang',btnBg:'linear-gradient(145deg,#16a34a,#22c55e)',fn:()=>{launchConfetti();if(currentLevel<levels.length-1){currentLevel++;loadLevel();}else{currentLevel=0;loadLevel();}closeModal();}},
                missing_item:{bg:'rgba(251,191,36,0.12)',icon:'⭐',title:'Bintang Ketinggalan!',tc:'#fbbf24',desc:'Sudah sampai Bumi, tapi bintangnya belum diambil (mungkin tersembunyi di kegelapan!). Kumpulkan dulu ya!',btnTxt:'✏️ Perbaiki Kode',btnBg:'linear-gradient(145deg,#b45309,#fbbf24)',fn:()=>{resetPlayer();closeModal();}},
                error:{bg:'rgba(239,68,68,0.12)',icon:'💥',title:'Aduh, Nabrak!',tc:'#f87171',desc:'Roketnya menabrak dinding! Coba lihat lagi arahnya ya.',btnTxt:'🔁 Coba Lagi',btnBg:'linear-gradient(145deg,#b91c1c,#ef4444)',fn:()=>{resetPlayer();closeModal();}},
                ufo:{bg:'rgba(168,85,247,0.12)',icon:'🛸',title:'Ditangkap UFO!',tc:'#c084fc',desc:'Wah, UFO-nya menangkap roket! Perhatikan polanya dan tembak UFO-nya!',btnTxt:'🔁 Coba Lagi',btnBg:'linear-gradient(145deg,#7e22ce,#a855f7)',fn:()=>{resetPlayer();closeModal();}},
                incomplete:{bg:'rgba(59,130,246,0.12)',icon:'🤔',title:'Belum Sampai!',tc:'#60a5fa',desc:'Roketnya berhenti tapi belum sampai Bumi. Tambah perintah lagi, ya!',btnTxt:'✏️ Tambah Perintah',btnBg:'linear-gradient(145deg,#1d4ed8,#3b82f6)',fn:()=>{resetPlayer();closeModal();}}
            };
            const cfg=cfgs[type]; if(!cfg)return;
            playSound(type==='win'?'win':type==='ufo'?'ufo':'error');
            iw.style.background=cfg.bg; ic.textContent=cfg.icon;
            ti.textContent=cfg.title; ti.style.color=cfg.tc;
            de.textContent=cfg.desc; bt.textContent=cfg.btnTxt;
            bt.style.background=cfg.btnBg; bt.onclick=cfg.fn;
            if(type==='win')launchConfetti();
        }

        function closeModal(){
            const modal=document.getElementById('modal'),content=document.getElementById('modal-content');
            modal.style.opacity='0'; content.style.transform='scale(0.85)';
            setTimeout(()=>modal.classList.add('hidden'),280);
        }

        window.onload=()=>{initLevelSelect();loadLevel();};
    </script>
</body>
</html>

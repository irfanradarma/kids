<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Crucial for mobile/tablet scaling and touch interactions -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRAVITY DROP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

:root {
  --bg:#080810; --panel:#10101c; --border:#222234;
  --accent:#00e5ff; --accent2:#ff3d71; --accent3:#ffe066; --green:#22c55e;
  --text:#dde0f0; --muted:#44465a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;user-select:none;
  /* Prevent touch actions like pull-to-refresh on mobile */
  touch-action: none;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,229,255,0.07) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 90% 100%,rgba(255,61,113,0.06) 0%,transparent 60%);
}
header{text-align:center;margin-bottom:8px; margin-top: 10px; width: 100%;}
h1{
  font-family:'Bebas Neue',sans-serif;font-size: clamp(32px, 8vw, 48px);letter-spacing:10px;
  color:var(--accent);text-shadow:0 0 30px rgba(0,229,255,0.5),0 0 70px rgba(0,229,255,0.2);line-height:1;
}

.mode-tabs {
  display: flex; justify-content: center; gap: 16px; margin-top: 12px; margin-bottom: 8px;
}
.tab {
  padding: 10px 28px; font-size: 14px; letter-spacing: 3px; border: 2px solid var(--border);
  border-radius: 25px; cursor: pointer; transition: all 0.2s; color: var(--muted);
  text-transform: uppercase; font-weight: 700;
}
.tab.active {
  background: rgba(0, 229, 255, 0.1); border-color: var(--accent);
  color: var(--accent); box-shadow: 0 0 15px rgba(0,229,255,0.2);
}
.tab:hover:not(.active) { color: var(--text); border-color: var(--muted); }

.level-badge{display:flex;align-items:center;gap:8px;margin-top:5px; flex-wrap: wrap; justify-content: center; min-height: 12px;}
.level-pip{width:26px;height:5px;border-radius:3px;background:var(--border);transition:all 0.3s;}
.level-pip.active{background:var(--accent);box-shadow:0 0 8px rgba(0,229,255,0.6);}
.level-pip.done{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,0.4);}
.level-pip.unlocked{cursor:pointer;}
.level-pip.unlocked:hover{transform:scaleY(1.5);background:var(--accent3);}
.level-lbl{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

/* Responsive Layout Overhaul */
.game-wrapper{
  display:flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; padding: 0 15px 15px 15px;
}

#gameCanvas{
  display:block; border:1px solid var(--border);border-radius:4px;cursor:crosshair;
  box-shadow:0 0 0 1px rgba(0,229,255,0.08),0 20px 60px rgba(0,0,0,0.7); width: 100%;
  max-width: min(100%, 65vh, 540px); aspect-ratio: 1 / 1; touch-action: none; 
}

.sidebar{
  width: 100%; max-width: min(100%, 65vh, 540px); display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
}
.sidebar .panel:nth-child(3) { grid-column: 1 / -1; }
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:11px;}
.panel-title{font-size:7px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;
  margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  
.toolbar{display:flex;flex-direction:row;flex-wrap:wrap;gap:4px;}
.block-btn{
  width: calc(50% - 2px); height:46px;background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:7px;padding:0 8px;transition:all 0.12s;
  -webkit-tap-highlight-color: transparent; 
}
.block-btn:hover{border-color:var(--accent);background:rgba(0,229,255,0.06);transform:translateX(2px);}
.block-btn.selected{border-color:var(--accent);background:rgba(0,229,255,0.1);}
.block-btn.eraser-selected{border-color:var(--accent2);background:rgba(255,61,113,0.1);}
.block-btn.disabled{opacity:0.25;pointer-events:none;}
.block-label{font-size:7px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;line-height:1.4;}

@media(min-width: 768px) {
  .game-wrapper { flex-direction: row; align-items: flex-start; justify-content: center; }
  .sidebar { width: 150px; max-width: none; display: flex; flex-direction: column; }
  .sidebar .panel:nth-child(3) { grid-column: auto; }
  .toolbar { flex-direction: column; }
  .block-btn { width: 100%; }
}

.btn{
  width:100%;padding:10px 8px;border:1px solid;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;font-weight:700;transition:all 0.15s;
}
.btn-drop{background:var(--accent);border-color:var(--accent);color:var(--bg);}
.btn-drop:hover{background:transparent;color:var(--accent);box-shadow:0 0 20px rgba(0,229,255,0.3);}
.btn-drop:disabled{opacity:0.4;cursor:not-allowed;}
.btn-reset{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-reset:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-next{background:var(--green);border-color:var(--green);color:var(--bg);display:none;}
.btn-next:hover{background:transparent;color:var(--green);}
.ball-row{display:flex;align-items:center;gap:7px;padding:8px 4px 0 4px; transition: 0.2s; border-radius:4px;}
.ball-row:hover{background: rgba(255,255,255,0.05);}
.ball-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 35%,#80f7ff,#00e5ff 50%,#0077aa);
  box-shadow:0 0 7px rgba(0,229,255,0.5);transition:all 0.3s;}
.ball-dot.bouncy{background:radial-gradient(circle at 35% 35%,#fff3a0,#ffe066 50%,#b45309);
  box-shadow:0 0 7px rgba(255,224,102,0.6);}
.ball-type{font-size:7px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.hint{font-size:7px;color:var(--muted);line-height:1.9;letter-spacing:0.3px;}
.hint strong{color:var(--accent);}

/* Overlays */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);
  backdrop-filter:blur(10px);z-index:100;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
}
.overlay.show{display:flex;}
.ov-lnum{font-size:10px;letter-spacing:4px;color:var(--muted);}
.ov-title{
  font-family:'Bebas Neue',sans-serif;letter-spacing:10px;
  text-shadow:0 0 40px currentColor;animation:pulse 1.6s ease-in-out infinite; text-align: center;
}
.ov-win{font-size:clamp(52px, 10vw, 76px);color:var(--accent3);}
.ov-sub{
  font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;
  text-align:center;max-width:340px;line-height:2.2;white-space:pre-line; padding: 0 15px;
}
.ov-btns{display:flex;gap:10px;margin-top:8px;}
.obtn{
  padding:12px 32px;background:transparent;border:1px solid;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;
  cursor:pointer;text-transform:uppercase;transition:all 0.2s;
}
.obtn-cyan{border-color:var(--accent);color:var(--accent);}
.obtn-cyan:hover{background:var(--accent);color:var(--bg);}
.obtn-gold{border-color:var(--accent3);color:var(--accent3);}
.obtn-gold:hover{background:var(--accent3);color:var(--bg);}
.obtn-green{border-color:var(--green);color:var(--green);}
.obtn-green:hover{background:var(--green);color:var(--bg);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
#dragGhost{position:fixed;pointer-events:none;z-index:999;opacity:0.85;display:none; transform-origin: center;}
</style>
</head>
<body>

<header>
  <h1>GRAVITY DROP</h1>
  <div class="mode-tabs">
    <div class="tab active" id="tabStory">STORY MODE</div>
    <div class="tab" id="tabDIY">D.I.Y. MODE</div>
  </div>
  <div class="level-badge" id="levelBadge">
    <!-- Pips injected here in story mode -->
  </div>
</header>

<div class="game-wrapper">
  <!-- Logical canvas always remains 540x540 -->
  <canvas id="gameCanvas" width="540" height="540"></canvas>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title" id="blocksTitle">Blocks</div>
      <div class="toolbar" id="toolbar"></div>
    </div>
    <div class="panel">
      <div class="panel-title" id="controlsTitle">Controls</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="btn btn-drop" id="dropBtn">▶ Drop</button>
        <div style="display:flex; gap:6px;">
          <button class="btn btn-reset" id="resetBtn" style="flex:1; padding:10px 0; font-size:8px;" title="Re-drop ball">↺ RETRY</button>
          <button class="btn btn-reset" id="clearBtn" style="flex:1; padding:10px 0; font-size:8px; color:var(--accent2); border-color:#222234;" title="Clear blocks">⨯ CLEAR</button>
        </div>
        <button class="btn btn-reset" id="shareBtn" style="display:none; padding:10px 0; font-size:8px; color:var(--accent3); border-color:var(--border);" title="Copy Level Link">🔗 SHARE LEVEL</button>
        <button class="btn btn-next" id="nextBtn">Next Level →</button>
      </div>
      <div class="ball-row" id="ballToggleRow" title="Toggle Ball Type (DIY Mode)">
        <div class="ball-dot" id="ballDot"></div>
        <span class="ball-type" id="ballType">Standard</span>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title" id="hintTitle">Tutorial</div>
      <p class="hint" id="hintBody"></p>
    </div>
  </div>
</div>

<canvas id="dragGhost" width="60" height="60"></canvas>

<!-- Win overlay -->
<div class="overlay" id="winOv">
  <div class="ov-lnum" id="winNum">LEVEL 1 COMPLETE</div>
  <div class="ov-title ov-win">YOU WIN!</div>
  <div class="ov-sub" id="winSub"></div>
  <div class="ov-btns">
    <button class="obtn obtn-gold" id="winRetryBtn" onclick="retryLevel()">↺ Retry</button>
    <button class="obtn obtn-green" id="winNextBtn" onclick="advanceLevel()">Next Level →</button>
  </div>
</div>

<!-- All done overlay -->
<div class="overlay" id="doneOv">
  <div class="ov-title ov-win" style="font-size:clamp(40px, 8vw, 60px);letter-spacing:6px;">ALL CLEAR!</div>
  <div class="ov-sub">All levels conquered.<br>Physics mastered.</div>
  <button class="obtn obtn-cyan" onclick="setMode('story'); startLevel(0);">↺ Play Again</button>
</div>

<script>
// ── Web Audio Synth System ──────────────────────────────────────────────────
const AudioSys = {
  ctx: null,
  init() { 
    if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
    if(this.ctx.state === 'suspended') this.ctx.resume();
  },
  play(type, volMod=1) {
    if(!this.ctx) return;
    const now = this.ctx.currentTime;
    
    if(type === 'click') {
      const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(800, now);
      g.gain.setValueAtTime(0.04, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.05);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(now); o.stop(now+0.05);
    }
    else if(type === 'place') {
      const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(400, now);
      g.gain.setValueAtTime(0.02, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.1);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(now); o.stop(now+0.1);
    }
    else if(type === 'erase') {
      const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now); o.frequency.exponentialRampToValueAtTime(50, now+0.1);
      g.gain.setValueAtTime(0.03, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.1);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(now); o.stop(now+0.1);
    }
    else if(type === 'drop') {
      const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
      o.type = 'triangle'; o.frequency.setValueAtTime(400, now); o.frequency.exponentialRampToValueAtTime(100, now+0.3);
      g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.3);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(now); o.stop(now+0.3);
    }
    else if(type === 'bounce') {
      const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(300 + Math.random()*100, now);
      g.gain.setValueAtTime(0.15 * volMod, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.1);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(now); o.stop(now+0.1);
    }
    else if(type === 'win') {
      [440, 554, 659, 880].forEach((f, i) => {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(f, now + i*0.1);
        g.gain.setValueAtTime(0, now);
        g.gain.setValueAtTime(0.1, now + i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.3);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(now + i*0.1); o.stop(now + i*0.1 + 0.3);
      });
    }
  }
};

// Initialize audio on first user interaction
document.addEventListener('pointerdown', () => AudioSys.init(), {once:true});

// ── Particle System for Wins ──────────────────────────────────────────────────
let particles = [];
function spawnWinParticles(x, y) {
  for(let i=0; i<80; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*20,
      vy: (Math.random()-0.5)*20 - 8,
      size: Math.random()*5+3,
      color: ['#00e5ff', '#ff3d71', '#ffe066', '#22c55e', '#ffffff'][Math.floor(Math.random()*5)],
      life: 1.0,
      decay: Math.random()*0.02 + 0.01,
      rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.5
    });
  }
}

const {Engine,Bodies,Body,World,Events,Composite} = Matter;

// Internal Simulation Size is locked.
const CS=540, COLS=9, ROWS=9, CELL=CS/COLS;

// ── Level data ────────────────────────────────────────────────────────────────
const LEVELS = [
  { id:0, name:"TUTORIAL", ballCol:4, holeCol:4, holeRow:8, holeMoving:false, bouncyBall:false, hurdles:[], maxBlocks:3, hint:"<strong>Tap</strong> or drag blocks from the toolbar to grid.\n<strong>Tap</strong> a placed block to rotate.\nUse the <strong>Eraser</strong> tool to remove.\n<strong>▶ Drop</strong> releases the ball." },
  { id:1, name:"OFF-CENTER", ballCol:4, holeCol:0, holeRow:5, holeMoving:false, bouncyBall:false, hurdles:[], maxBlocks:4, hint:"The hole is on the <strong>left side</strong>.\n\nUse <strong>Ramp ←</strong> \nto bend the ball's trajectory.\nTap blocks to rotate them." },
  { id:2, name:"HURDLES", ballCol:4, holeCol:8, holeRow:4, holeMoving:false, bouncyBall:false, hurdles:[{col:3,row:3,type:0},{col:4,row:3,type:0},{col:5,row:3,type:0},{col:4,row:5,type:0}], maxBlocks:5, hint:"<strong>🔒 Orange blocks</strong> are fixed.\nYou can't remove or rotate them.\n\nBuild a path around them\nto reach the right-side goal." },
  { id:3, name:"MOVING TARGET", ballCol:4, holeCol:4, holeRow:7, holeMoving:true, holeSpeed:1.5, bouncyBall:false, hurdles:[{col:2,row:3,type:0},{col:6,row:5,type:0},{col:3,row:6,type:0},{col:4,row:6,type:0}], maxBlocks:5, hint:"The <strong>◀ ▶ red goal</strong> is moving!\n\nTime your drop carefully,\nor use blocks to guide the ball\ntoward the center path." },
  { id:4, name:"HURDLES II", ballCol:1, holeCol:8, holeRow:4, holeMoving:false, bouncyBall:true, hurdles:[{col:3,row:5,type:0},{col:4,row:3,type:0},{col:5,row:3,type:0},{col:4,row:5,type:0},{col:6,row:4,type:0}], maxBlocks:4, hint: "<strong>Bouncy ball</strong> — high restitution!\n\nIt will ricochet off surfaces.\nRamps help absorb energy\nand redirect it." },
  { id:5, name:"BOUNCY BALL", ballCol:4, holeCol:2, holeRow:7, holeMoving:false, bouncyBall:true, hurdles:[{col:1,row:2,type:0},{col:5,row:3,type:1},{col:6,row:5,type:0},{col:2,row:6,type:0},{col:1,row:6,type:2},{col:3,row:6,type:1},{col:1,row:8,type:2},{col:3,row:8,type:1}], maxBlocks:6, hint:"let's be creative" }
];

const diyLevel = {
  id:'diy', name:"MY LEVEL", ballCol:4, holeCol:4, holeRow:8, holeMoving:false, bouncyBall:false, hurdles:[], maxBlocks:99, hint:""
};

// ── State ─────────────────────────────────────────────────────────────────────
let engine,world,ball,holeSensor;
let holeVX=0, holeDir=1;
let placedBlocks=[],hurdleBodies=[];
let gameRunning=false,won=false;
let currentLevel=0,maxUnlockedLevel=0;
let gameMode = 'story'; // 'story', 'diy_build', 'diy_play'
let isCommunityLevel = false;
let selectedType=0,blockCount=0;
let dragging=null,mouseX=0,mouseY=0,ghostVisible=false;
let idleFrames=0; let lastBallPos={x:0, y:0};

const canvas=document.getElementById('gameCanvas'); const ctx=canvas.getContext('2d');
const ghostCanvas=document.getElementById('dragGhost'); const ghostCtx=ghostCanvas.getContext('2d');

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (CS / rect.width), y: (e.clientY - rect.top) * (CS / rect.height) };
}

// ── Level Sharing Logic ───────────────────────────────────────────────────────
function getShareableURL() {
  const data = {
    bc: diyLevel.ballCol,
    hc: diyLevel.holeCol,
    hr: diyLevel.holeRow,
    bb: diyLevel.bouncyBall,
    h: diyLevel.hurdles.map(h => ({c: h.col, r: h.row, t: h.type, a: Math.round(h.rotation * 100) / 100}))
  };
  const encoded = btoa(JSON.stringify(data));
  const url = new URL(window.location.href);
  url.hash = 'lvl=' + encoded;
  return url.href;
}

function loadFromURL() {
  const hash = window.location.hash;
  if (hash && hash.startsWith('#lvl=')) {
    try {
      const encoded = hash.replace('#lvl=', '');
      const data = JSON.parse(atob(encoded));
      diyLevel.ballCol = data.bc ?? 4;
      diyLevel.holeCol = data.hc ?? 4;
      diyLevel.holeRow = data.hr ?? 8;
      diyLevel.bouncyBall = !!data.bb;
      diyLevel.hurdles = (data.h || []).map(h => ({col: h.c, row: h.r, type: h.t, rotation: h.a || 0}));
      isCommunityLevel = true;
      return true;
    } catch(e) {
      console.error("Failed to load level from URL", e);
    }
  }
  return false;
}

function copyToClipboard(text) {
  const temp = document.createElement('textarea');
  temp.value = text;
  temp.style.position = 'fixed';
  temp.style.opacity = '0';
  document.body.appendChild(temp);
  temp.select();
  try { document.execCommand('copy'); } catch (err) { console.error('Copy failed', err); }
  document.body.removeChild(temp);
}

// ── Block types ───────────────────────────────────────────────────────────────
const BTYPES=[
  {id:0,name:'Solid',   color:'#3730a3'},
  {id:1,name:'Ramp →',  color:'#6d28d9'},
  {id:2,name:'Ramp ←',  color:'#7e22ce'}
];

function drawBV(c,type,size,color,alpha=1){
  c.save(); c.globalAlpha=alpha;
  const m=2.5, s=size-m*2; c.fillStyle=color; c.beginPath();
  if(type===0){ c.roundRect(m,m,s,s,3); } 
  else if(type===1){ c.moveTo(m,m); c.lineTo(size-m,size-m); c.lineTo(m,size-m); c.closePath(); } 
  else if(type===2){ c.moveTo(size-m,m); c.lineTo(size-m,size-m); c.lineTo(m,size-m); c.closePath(); }
  if(type>=0 && type<=2){ c.fill(); }
  c.strokeStyle='rgba(255,255,255,0.12)'; c.lineWidth=1; c.stroke();
  c.restore();
}

function drawBlockAt(c,type,x,y,size,rot=0,alpha=1,hurdle=false){
  const color=hurdle?'#c2410c':BTYPES[type].color;
  c.save(); c.translate(x+size/2,y+size/2); c.rotate(rot); c.translate(-size/2,-size/2);
  drawBV(c,type,size,color,alpha); c.restore();
}

function drawToolIcon(c, type, size, alpha=1) {
  c.clearRect(0,0,size,size);
  if(type >= 0 && type <= 2) { drawBV(c, type, size, '#c2410c', alpha); } // DIY Hurdle
  else if (type === 3) { // Ball Tool
      const br = size*0.35; c.fillStyle = diyLevel.bouncyBall ? '#ffe066' : '#00e5ff'; c.globalAlpha = alpha;
      c.beginPath(); c.arc(size/2, size/2, br, 0, Math.PI*2); c.fill();
  } else if (type === 4) { // Hole Tool
      const hr = size*0.41; c.strokeStyle = '#ff3d71'; c.lineWidth = 2; c.globalAlpha = alpha;
      c.beginPath(); c.arc(size/2, size/2, hr, 0, Math.PI*2); c.stroke();
  }
}

// ── Physics bodies ────────────────────────────────────────────────────────────
function makeBlockBody(type,col,row,rot=0){
  const cx=col*CELL+CELL/2, cy=row*CELL+CELL/2; const h=CELL/2; 
  const o={isStatic:true,friction:0.4,restitution:0.25,label:'block', collisionFilter:{category:0x0004,mask:0x0001}};
  let body;
  if(type===0){ body=Bodies.rectangle(cx,cy,CELL,CELL,o); } 
  else if(type===1){ body=Bodies.fromVertices(cx,cy,[[{x:-h,y:-h},{x:-h,y:h},{x:h,y:h}]],o,true); } 
  else if(type===2){ body=Bodies.fromVertices(cx,cy,[[{x:h,y:-h},{x:-h,y:h},{x:h,y:h}]],o,true); }
  if(!body) return null;
  Matter.Body.translate(body, { x: (cx - h) - body.bounds.min.x, y: (cy - h) - body.bounds.min.y });
  if(rot!==0) { Matter.Body.rotate(body, rot, {x: cx, y: cy}); }
  return body;
}

function createPhysics(){
  engine=Engine.create({gravity:{x:0,y:0}}); world=engine.world;
  const wo={isStatic:true,friction:0.3,restitution:0.2,label:'wall', collisionFilter:{category:0x0004,mask:0x0001}};
  World.add(world,[
    Bodies.rectangle(CS/2,-50,CS+40,100,wo),     // Top (High roof)
    Bodies.rectangle(-10,CS/2,20,CS+40,wo),     // Left
    Bodies.rectangle(CS+10,CS/2,20,CS+40,wo),   // Right
    Bodies.rectangle(CS/2,CS+10,CS+40,20,wo),   // Bottom
  ]);
  Events.on(engine,'collisionStart',e=>{
    e.pairs.forEach(p=>{
      const l=[p.bodyA.label,p.bodyB.label];
      if(l.includes('ball')&&l.includes('hole')) triggerWin();
      else if(l.includes('ball') && gameRunning) {
          const speed = ball.speed;
          if(speed > 1.2) AudioSys.play('bounce', Math.min(speed/8, 1.0));
      }
    });
  });
}

function setMode(mode) {
  AudioSys.play('click');
  
  if(mode === 'story' && window.location.hash) {
      history.replaceState(null, null, ' '); // Clear share hash
      isCommunityLevel = false;
  }
  if(mode === 'diy_build') isCommunityLevel = false;

  gameMode = mode;
  document.getElementById('tabStory').className = mode === 'story' ? 'tab active' : 'tab';
  document.getElementById('tabDIY').className = mode.startsWith('diy') ? 'tab active' : 'tab';
  
  if (mode === 'story') {
    document.getElementById('levelBadge').style.visibility = 'visible';
    startLevel(maxUnlockedLevel);
  } else if (mode === 'diy_build') {
    document.getElementById('levelBadge').style.visibility = 'hidden';

  } else if (mode === 'diy_play') {

  }
}

document.getElementById('tabStory').onclick = () => { if(gameMode!=='story') setMode('story'); };
document.getElementById('tabDIY').onclick = () => { if(!gameMode.startsWith('diy')) setMode('diy_build'); };

function startLevel(idx, keepBlocks = false){
  particles = []; // Clear particles
  const savedBlocks = keepBlocks ? placedBlocks.map(b => ({type: b.type, col: b.col, row: b.row, rotation: b.rotation})) : [];
  currentLevel = idx;
  const lvl = idx === 'diy' ? diyLevel : LEVELS[idx];
  won = false; gameRunning = false; blockCount = 0; idleFrames = 0; lastBallPos = {x:0, y:0};
  
  if(engine){ Events.off(engine); World.clear(world); Engine.clear(engine); }
  placedBlocks=[]; hurdleBodies=[];
  createPhysics();

  // Ball Setup
  const bx=lvl.ballCol*CELL+CELL/2, by=CELL*0.5;
  ball=Bodies.circle(bx,by,CELL*0.35,{
    restitution:lvl.bouncyBall?0.85:0.35, friction:lvl.bouncyBall?0.05:0.3,
    frictionAir:lvl.bouncyBall?0.005:0.012, density:lvl.bouncyBall?0.0004:0.001,
    isStatic:true, label:'ball', collisionFilter:{category:0x0001,mask:0x0002|0x0004}
  });
  World.add(world,ball);

  // Hole Setup
  const hrw = lvl.holeRow !== undefined ? lvl.holeRow : ROWS-1;
  const hx=lvl.holeCol*CELL+CELL/2, hy=hrw*CELL+CELL/2;
  holeVX=hx; holeDir=1;
  holeSensor=Bodies.circle(hx,hy,CELL*0.44,{
    isStatic:true, isSensor:true, label:'hole', collisionFilter:{category:0x0002,mask:0x0001}
  });
  World.add(world,holeSensor);

  // Hurdles Setup
  lvl.hurdles.forEach(h=>{
    const b=makeBlockBody(h.type,h.col,h.row,h.rotation||0);
    if(b){ b.label='hurdle'; World.add(world,b); hurdleBodies.push({body:b,...h}); }
  });

  // Restore User Blocks
  if(gameMode !== 'diy_build') {
    savedBlocks.forEach(sb => {
      const body = makeBlockBody(sb.type, sb.col, sb.row, sb.rotation);
      if (body) {
        World.add(world, body);
        placedBlocks.push({body, type: sb.type, col: sb.col, row: sb.row, rotation: sb.rotation});
        blockCount++;
      }
    });
  }

  // UI Updates
  if(selectedType === -1) selectedType = 0;
  if(gameMode === 'story') updatePips();
  
  buildToolbar(); updateHint(); updateBallUI(); updateControlButtons();
  document.getElementById('winOv').classList.remove('show');
  document.getElementById('doneOv').classList.remove('show');
}

// ── Drag & Drop & Tap Mechanics ───────────────────────────────────────────────
function startDrag(e,type){
  if(type === -1) return;
  dragging={type};
  const g=document.getElementById('dragGhost'); g.style.display='block'; ghostVisible=true;
  ghostCtx.clearRect(0,0,60,60);
  if(gameMode === 'diy_build') drawToolIcon(ghostCtx, type, 60, 0.85);
  else drawBV(ghostCtx,type,60,BTYPES[type].color,0.85);
  moveGhost(e.clientX,e.clientY);
}

function moveGhost(cx,cy){
  const g=document.getElementById('dragGhost');
  const rect = canvas.getBoundingClientRect(); const scale = rect.width / CS;
  g.style.transform = `translate(-50%, -50%) scale(${scale})`;
  g.style.left = cx + 'px'; g.style.top = cy + 'px';
}

document.addEventListener('pointermove', e => { mouseX=e.clientX; mouseY=e.clientY; if(dragging) moveGhost(e.clientX,e.clientY); });
document.addEventListener('pointerup', e => {
  if(!dragging) return;
  document.getElementById('dragGhost').style.display='none'; ghostVisible=false;
  const pos = getCanvasPos(e);
  if(pos.x >= 0 && pos.x < CS && pos.y >= 0 && pos.y < CS) { doPlaceOrAction(dragging.type, pos.x, pos.y); }
  dragging=null;
});

canvas.addEventListener('pointerdown', e => {
  if(gameRunning || dragging) return; 
  const pos = getCanvasPos(e);
  doPlaceOrAction(selectedType, pos.x, pos.y);
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

function doPlaceOrAction(type, x, y) {
  const col = Math.floor(x/CELL), row = Math.floor(y/CELL);
  if(col<0||col>=COLS||row<0||row>=ROWS) return;
  
  if (gameMode === 'diy_build') {
     handleDIYBuildClick(type, col, row);
  } else {
     handlePlayClick(type, col, row);
  }
}

function handleDIYBuildClick(type, col, row) {
  if (type === -1) { // Eraser
     const idx = diyLevel.hurdles.findIndex(h => h.col===col && h.row===row);
     if(idx >= 0) { AudioSys.play('erase'); diyLevel.hurdles.splice(idx, 1); startLevel('diy'); }
  } else if (type === 3) { // Ball
     if(row === 0) { AudioSys.play('place'); diyLevel.ballCol = col; startLevel('diy'); }
  } else if (type === 4) { // Hole
     AudioSys.play('place'); diyLevel.holeCol = col; diyLevel.holeRow = row; startLevel('diy');
  } else if (type >= 0 && type <= 2) { // Hurdle
     if(col === diyLevel.ballCol && row === 0) return;
     if(col === diyLevel.holeCol && row === diyLevel.holeRow) return;
     const idx = diyLevel.hurdles.findIndex(h => h.col===col && h.row===row);
     if(idx >= 0) {
         diyLevel.hurdles[idx].rotation = (diyLevel.hurdles[idx].rotation + Math.PI/2) % (Math.PI*2);
     } else {
         diyLevel.hurdles.push({type: type, col: col, row: row, rotation: 0});
     }
     AudioSys.play('place'); startLevel('diy');
  }
}

function handlePlayClick(type, col, row) {
  const lvl = gameMode === 'diy_play' ? diyLevel : LEVELS[currentLevel];
  const hrw = lvl.holeRow !== undefined ? lvl.holeRow : ROWS-1;
  const idx = placedBlocks.findIndex(b => b.col === col && b.row === row);

  if(type === -1) { // Eraser
      if(idx >= 0) {
          AudioSys.play('erase'); World.remove(world, placedBlocks[idx].body);
          placedBlocks.splice(idx, 1); blockCount--;
      }
      return;
  }
  
  if(idx >= 0) { // Rotate existing
      const bd = placedBlocks[idx];
      bd.rotation = (bd.rotation + Math.PI / 2) % (Math.PI * 2);
      World.remove(world, bd.body);
      const nb = makeBlockBody(bd.type, bd.col, bd.row, bd.rotation);
      if(nb) { bd.body = nb; World.add(world, nb); AudioSys.play('place'); }
  } else { // Place new
      if(col===lvl.ballCol && row===0) return;
      if(!lvl.holeMoving && col===lvl.holeCol && row===hrw) return;
      if(lvl.holeMoving && row===hrw) return;
      if(hurdleBodies.find(h=>h.col===col&&h.row===row)) return;
      if(blockCount>=lvl.maxBlocks) return;
      
      const body=makeBlockBody(type,col,row,0);
      if(!body) return;
      AudioSys.play('place');
      World.add(world,body);
      placedBlocks.push({body,type,col,row,rotation:0});
      blockCount++;
  }
}

function triggerWin(){
  if(won)return;won=true;gameRunning=false;
  AudioSys.play('win');
  spawnWinParticles(holeSensor.position.x, holeSensor.position.y);
  Body.setStatic(ball,true);Body.setVelocity(ball,{x:0,y:0});
  
  if(gameMode === 'story') {
    maxUnlockedLevel = Math.max(maxUnlockedLevel, currentLevel + 1);
    updatePips(); 
  }
  
  setTimeout(()=>{
    if(gameMode === 'diy_play') {
        document.getElementById('winNum').textContent = isCommunityLevel ? "COMMUNITY LEVEL CLEARED!" : "D.I.Y. COMPLETE";
        document.getElementById('winSub').textContent = isCommunityLevel ? "Great job!" : "Your level is perfectly playable!";
        document.getElementById('winRetryBtn').style.display = 'block';
        document.getElementById('winNextBtn').textContent = "✎ Edit Level";
        document.getElementById('winNextBtn').onclick = () => { AudioSys.play('click'); setMode('diy_build'); };
    } else {
        document.getElementById('winNum').textContent=`LEVEL ${currentLevel+1} COMPLETE`;
        const subs=["Straight down — nice!","Redirected perfectly!","Navigated the hurdles!","Block limit mastered!","Timed the moving target!","Tamed the bouncy beast!"];
        document.getElementById('winSub').textContent=subs[currentLevel]||'';
        document.getElementById('winRetryBtn').style.display = 'block';
        document.getElementById('winNextBtn').textContent=currentLevel>=LEVELS.length-1?'★ Finish':'Next Level →';
        document.getElementById('winNextBtn').onclick = advanceLevel;
    }
    document.getElementById('winOv').classList.add('show');
  }, 1000); // Wait a sec for particles
}

function tickHole(){
  const lvl = gameMode.startsWith('diy') ? diyLevel : LEVELS[currentLevel];
  if(!lvl.holeMoving||won)return;
  const spd=lvl.holeSpeed||1.4; holeVX+=holeDir*spd;
  if(holeVX>CS-CELL*0.5){holeVX=CS-CELL*0.5;holeDir=-1;}
  if(holeVX<CELL*0.5){holeVX=CELL*0.5;holeDir=1;}
  Body.setPosition(holeSensor,{x:holeVX,y:holeSensor.position.y});
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  Engine.update(engine,1000/60);
  tickHole();

  if(gameRunning && !won) {
    const dx = ball.position.x - lastBallPos.x; const dy = ball.position.y - lastBallPos.y;
    if(Math.sqrt(dx*dx + dy*dy) < 0.2) {
      idleFrames++; if(idleFrames > 90) { AudioSys.play('erase'); startLevel(currentLevel, true); }
    } else { idleFrames = 0; }
    lastBallPos = {x: ball.position.x, y: ball.position.y};
    
    if(ball.position.y < -50 || ball.position.x < -50 || ball.position.x > CS + 50) {
      AudioSys.play('erase'); startLevel(currentLevel, true);
    }
  }

  ctx.clearRect(0,0,CS,CS);
  ctx.fillStyle='#0b0b14';ctx.fillRect(0,0,CS,CS);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.042)';ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,CS);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(CS,r*CELL);ctx.stroke();}

  const lvl = gameMode.startsWith('diy') ? diyLevel : LEVELS[currentLevel];
  const hrw = lvl.holeRow !== undefined ? lvl.holeRow : ROWS-1;

  // DIY Zones / Reserved Tints
  if(gameMode === 'diy_build') {
      ctx.fillStyle='rgba(0,229,255,0.05)';ctx.fillRect(0,0,CS,CELL); // Top row allowed
      ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(0,CELL,CS,CS-CELL);
  } else {
      ctx.fillStyle='rgba(0,229,255,0.025)';ctx.fillRect(0,0,CS,CELL);
      ctx.fillStyle='rgba(255,61,113,0.025)';
      if (lvl.holeMoving) { ctx.fillRect(0,hrw*CELL,CS,CELL); } 
      else { ctx.fillRect(lvl.holeCol*CELL,hrw*CELL,CELL,CELL); }
  }

  // Block counter
  if(gameMode !== 'diy_build') {
      const rem=lvl.maxBlocks-blockCount;
      ctx.fillStyle=rem>0?'rgba(0,229,255,0.5)':'rgba(255,61,113,0.6)';
      ctx.font='700 8px Space Mono';ctx.textAlign='left';
      if(lvl.maxBlocks < 99) ctx.fillText(`BLOCKS ${blockCount}/${lvl.maxBlocks}`,5,CS-5);
  }

  // Hurdles
  hurdleBodies.forEach(h=>{
    drawBlockAt(ctx,h.type,h.col*CELL,h.row*CELL,CELL,h.rotation,1,true);
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('🔒',h.col*CELL+CELL/2,h.row*CELL+CELL/2+4);
  });

  // Placed blocks
  placedBlocks.forEach(bd=>{
    drawBlockAt(ctx,bd.type,bd.col*CELL,bd.row*CELL,CELL,bd.rotation);
    ctx.strokeStyle='rgba(0,229,255,0.15)';ctx.lineWidth=1;
    ctx.strokeRect(bd.col*CELL+1,bd.row*CELL+1,CELL-2,CELL-2);
  });

  // Hover Previews
  if(!gameRunning && mouseX > 0 && mouseY > 0) {
    const rect = canvas.getBoundingClientRect();
    const mx = (mouseX - rect.left) * (CS / rect.width); const my = (mouseY - rect.top) * (CS / rect.height);
    
    if(mx >= 0 && mx < CS && my >= 0 && my < CS) {
        const pc = Math.floor(mx/CELL), pr = Math.floor(my/CELL);
        const bd = placedBlocks.find(b => b.col === pc && b.row === pr);
        const hr = hurdleBodies.find(h => h.col === pc && h.row === pr);
        
        if (gameMode === 'diy_build') {
            if(selectedType === -1 && hr) { // Erasing hurdle
                ctx.fillStyle = 'rgba(255,61,113,0.35)'; ctx.fillRect(pc*CELL, pr*CELL, CELL, CELL);
                ctx.strokeStyle = '#ff3d71'; ctx.lineWidth = 2; ctx.strokeRect(pc*CELL+2, pr*CELL+2, CELL-4, CELL-4);
            } else if (selectedType !== -1 && !dragging) {
                let ok = true;
                if(selectedType === 3 && pr !== 0) ok = false; // ball only top
                if(selectedType >= 0 && selectedType <= 2 && ((pc===lvl.ballCol && pr===0) || (pc===lvl.holeCol && pr===lvl.holeRow))) ok = false;
                ctx.strokeStyle=ok?'rgba(255,255,255,0.3)':'rgba(255,61,113,0.4)';
                ctx.lineWidth=2;ctx.strokeRect(pc*CELL+2,pr*CELL+2,CELL-4,CELL-4);
                if(ok) drawToolIcon(ctx, selectedType, CELL, 0.3);
                ctx.translate(pc*CELL, pr*CELL); drawToolIcon(ctx, selectedType, CELL, 0.3); ctx.translate(-pc*CELL, -pr*CELL);
            }
        } else {
            // Story / Play Mode Hover
            if(selectedType === -1 && bd) {
                ctx.fillStyle = 'rgba(255,61,113,0.35)'; ctx.fillRect(pc*CELL, pr*CELL, CELL, CELL);
                ctx.strokeStyle = '#ff3d71'; ctx.lineWidth = 2; ctx.strokeRect(pc*CELL+2, pr*CELL+2, CELL-4, CELL-4);
            } else if (selectedType !== -1 && !dragging) {
                const ok = pr>=0 && pr<ROWS && !(pc===lvl.ballCol && pr===0) &&
                           !(lvl.holeMoving ? pr===hrw : (pc===lvl.holeCol && pr===hrw)) && !hr;
                const canPlace = ok && (blockCount<lvl.maxBlocks || bd);
                if(ok) {
                  ctx.strokeStyle=canPlace?'rgba(0,229,255,0.4)':'rgba(255,61,113,0.4)';
                  ctx.lineWidth=2;ctx.strokeRect(pc*CELL+2,pr*CELL+2,CELL-4,CELL-4);
                  if(!bd && canPlace) drawBlockAt(ctx,selectedType,pc*CELL,pr*CELL,CELL,0,0.15);
                }
            }
        }
    }
  }

  // Hole
  const hx=holeSensor.position.x, hy=holeSensor.position.y, hrC=CELL*0.41;
  const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,hrC*2.4);
  hg.addColorStop(0,'rgba(255,61,113,0.4)');hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(hx,hy,hrC*2.4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ff3d71';ctx.lineWidth=2;ctx.beginPath();ctx.arc(hx,hy,hrC,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,61,113,0.18)';ctx.beginPath();ctx.arc(hx,hy,hrC,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff3d71';ctx.beginPath();ctx.arc(hx,hy,hrC*0.32,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,61,113,0.65)';ctx.font='700 7px Space Mono';ctx.textAlign='center';
  ctx.fillText(lvl.holeMoving?'◀  ▶':'GOAL',hx,hy+hrC+12);

  // Ball
  const bp=ball.position, br=CELL*0.35;
  const bouncy=lvl.bouncyBall;
  const bg=ctx.createRadialGradient(bp.x,bp.y,0,bp.x,bp.y,br*2.5);
  bg.addColorStop(0,bouncy?'rgba(255,224,102,0.4)':'rgba(0,229,255,0.35)'); bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bp.x,bp.y,br*2.5,0,Math.PI*2);ctx.fill();
  const bbg=ctx.createRadialGradient(bp.x-br*0.3,bp.y-br*0.3,0,bp.x,bp.y,br);
  if(bouncy){bbg.addColorStop(0,'#fff3a0');bbg.addColorStop(0.55,'#ffe066');bbg.addColorStop(1,'#92400e');}
  else{bbg.addColorStop(0,'#9efeff');bbg.addColorStop(0.55,'#00e5ff');bbg.addColorStop(1,'#005f7a');}
  ctx.fillStyle=bbg;ctx.beginPath();ctx.arc(bp.x,bp.y,br,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.28)';ctx.beginPath();ctx.arc(bp.x-br*0.27,bp.y-br*0.27,br*0.2,0,Math.PI*2);ctx.fill();
  
  if(!gameRunning) {
      ctx.fillStyle=bouncy?'rgba(255,224,102,0.65)':'rgba(0,229,255,0.55)';
      ctx.font='700 7px Space Mono';ctx.textAlign='center';
      ctx.fillText(bouncy?'BOUNCY':'BALL',bp.x,bp.y-br-5);
  }

  // Particles
  for(let i=particles.length-1; i>=0; i--) {
      let p = particles[i];
      p.vy += 0.5; // gravity
      p.x += p.vx; p.y += p.vy;
      p.rot += p.rotSpeed;
      p.life -= p.decay;
      if(p.life <= 0) { particles.splice(i, 1); }
      else {
          ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
          ctx.translate(p.x, p.y); ctx.rotate(p.rot);
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
          ctx.restore();
      }
  }

  requestAnimationFrame(render);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initPips();
if (loadFromURL()) {
    setMode('diy_play');
} else {
    startLevel(0);
}
render();
</script>
